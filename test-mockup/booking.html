<!DOCTYPE html>
<html lang="sv">
 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boka biljetter - Kvarter Bion</title>
  <link rel="stylesheet" href="booking-style.css" />
  <script>
    let selectedSeats = [];
    const urlParams = new URLSearchParams(window.location.search);
    const film = urlParams.get('film') || 'Okänd film';

    function generateSeats() {
      const seatsDiv = document.getElementById('seats');
      seatsDiv.innerHTML = '';
      
      // Generate rows
      for (let row = 1; row <= 8; row++) {
        // Left row number
        const leftLabel = document.createElement('div');
        leftLabel.className = 'row-label';
        leftLabel.textContent = row;
        seatsDiv.appendChild(leftLabel);
        
        // Seats in the row
        for (let col = 1; col <= 12; col++) {
          const seat = document.createElement('button');
          // Mark row 4, seats 5-8 as VIP
          if (row === 4 && col >= 5 && col <= 8) {
            seat.className = 'seat vip';
          // Mark row 3, seats 3-5 as elder seats
          } else if (row === 3 && col >= 3 && col <= 5) {
            seat.className = 'seat elder';
          } else {
            seat.className = 'seat available';
          }
          seat.textContent = col;
          seat.setAttribute('data-row', row);
          seat.setAttribute('data-col', col);
          seat.onclick = () => selectSeat(seat, `${row}-${col}`);
          seatsDiv.appendChild(seat);
        }
        
        // Right row number
        const rightLabel = document.createElement('div');
        rightLabel.className = 'row-label';
        rightLabel.textContent = row;
        seatsDiv.appendChild(rightLabel);
      }
    }

    function selectSeat(button, seatId) {
      const numPeople = parseInt(document.getElementById('numPeople').value);
      if (button.classList.contains('selected')) {
        button.classList.remove('selected');
        selectedSeats = selectedSeats.filter(s => s !== seatId);
      } else if (selectedSeats.length < numPeople) {
        button.classList.add('selected');
        selectedSeats.push(seatId);
      } else {
        alert('Du har redan valt max antal platser.');
      }
    }

    function confirmBooking() {
      if (selectedSeats.length === 0) {
        alert('Välj minst en plats.');
        return;
      }
      alert(`Bokning bekräftad för ${film}: ${selectedSeats.join(', ')}`);
    }

    window.onload = generateSeats;
  </script>
</head>
 
<body>
 
  <header class="navbar">
    <h1 class="logo">Kvarter Bion</h1>
    <nav>
      <a href="index.html">Filmer</a>
      <a href="#">Biljetter</a>
      <a href="#">Profil</a>
    </nav>
  </header>
 
  <section class="hero">
    <h2>Boka biljetter för: <span id="filmTitle"></span></h2>
    <script>document.getElementById('filmTitle').textContent = film;</script>
    <p>Välj antal personer och platser.</p>
    <label for="numPeople">Antal personer:</label>
    <select id="numPeople">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </section>
 
  <section class="cinema">
    <div class="cinema-header">
      <h3>Salong - Skärm</h3>
      <div class="seat-legend">
        <div class="legend-item">
          <span class="legend-color available"></span>
          <span class="legend-text">Lediga platser</span>
        </div>
        <div class="legend-item">
          <span class="legend-color elder"></span>
          <span class="legend-text">Äldre platser</span>
        </div>
        <div class="legend-item">
          <span class="legend-color vip"></span>
          <span class="legend-text">VIP platser</span>
        </div>
      </div>
    </div>
    <div class="screen">Bio Skärm</div>
    <div id="seats" class="seats-grid"></div>
    <button onclick="confirmBooking()">Bekräfta bokning</button>
  </section>
 
  <footer>
    <p>© 2026 Kvarter Bion</p>
  </footer>
<script src="frontside.js"></script>
</body>
 
</html>
