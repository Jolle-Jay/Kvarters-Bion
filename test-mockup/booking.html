<!DOCTYPE html>
<html lang="sv">
 
<head>
  <meta charset="UTF-8" />
  <title>Boka biljetter - Kvarter Bion</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    let selectedSeats = [];
    const urlParams = new URLSearchParams(window.location.search);
    const film = urlParams.get('film') || 'Okänd film';

    function generateSeats() {
      const seatsDiv = document.getElementById('seats');
      seatsDiv.innerHTML = '';
      for (let row = 1; row <= 8; row++) {
        for (let col = 1; col <= 12; col++) {
          const seat = document.createElement('button');
          seat.textContent = `${row}-${col}`;
          seat.className = 'seat available';
          seat.onclick = () => selectSeat(seat, `${row}-${col}`);
          seatsDiv.appendChild(seat);
        }
      }
    }

    function selectSeat(button, seatId) {
      const numPeople = parseInt(document.getElementById('numPeople').value);
      if (button.classList.contains('selected')) {
        button.classList.remove('selected');
        selectedSeats = selectedSeats.filter(s => s !== seatId);
      } else if (selectedSeats.length < numPeople) {
        button.classList.add('selected');
        selectedSeats.push(seatId);
      } else {
        alert('Du har redan valt max antal platser.');
      }
    }

    function confirmBooking() {
      if (selectedSeats.length === 0) {
        alert('Välj minst en plats.');
        return;
      }
      alert(`Bokning bekräftad för ${film}: ${selectedSeats.join(', ')}`);
    }

    window.onload = generateSeats;
  </script>
</head>
 
<body>
 
  <header class="navbar">
    <h1 class="logo">Kvarter Bion</h1>
    <nav>
      <a href="index.html">Filmer</a>
      <a href="#">Biljetter</a>
      <a href="#">Profil</a>
    </nav>
  </header>
 
  <section class="hero">
    <h2>Boka biljetter för: <span id="filmTitle"></span></h2>
    <script>document.getElementById('filmTitle').textContent = film;</script>
    <p>Välj antal personer och platser.</p>
    <label for="numPeople">Antal personer:</label>
    <select id="numPeople">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </section>
 
  <section class="cinema">
    <h3>Salong - Skärm</h3>
    <div class="screen">Bio Skärm</div>
    <div id="seats" class="seats-grid"></div>
    <button onclick="confirmBooking()">Bekräfta bokning</button>
  </section>
 
  <footer>
    <p>© 2026 Kvarter Bion</p>
  </footer>
<script src="frontside.js"></script>
</body>
 
</html>
